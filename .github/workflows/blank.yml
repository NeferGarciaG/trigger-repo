name: Pipeline on Argo Deploy

on:
  repository_dispatch:
    types: [argo_deploy]

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - name: Check if revision is a release commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REVISION: ${{ github.event.client_payload.revision }}
          SOURCE_REPO: NeferGarciaG/argo-github
        run: |
          COMMIT_MSG=$(gh api /repos/$SOURCE_REPO/commits/$REVISION --jq '.commit.message')
          echo "Revision : $REVISION"
          echo "Message  : $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qi "\[release\]"; then
            echo "is_release=true"  >> $GITHUB_OUTPUT
            echo "✅ Release commit — pipeline will run"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "⏭️  Not a release commit — skipping"
          fi

  run-pipeline:
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Run pipeline (trigger-repo)
        run: |
          echo "App:      ${{ github.event.client_payload.app }}"
          echo "Env:      ${{ github.event.client_payload.env }}"
          echo "Revision: ${{ github.event.client_payload.revision }}"
          echo "Health:   ${{ github.event.client_payload.health }}"
          echo "Argo:     ${{ github.event.client_payload.argo_link }}"

  notify-downstream:
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    # En producción real esto no existe — cada servicio tiene su propia
    # ArgoCD Application que notifica directamente a su repo.
    # Aquí lo simulamos desde trigger-repo porque el POC tiene una sola Application.
    strategy:
      matrix:
        repo:
          - NeferGarciaG/trigger-repo-2
          - NeferGarciaG/trigger-repo-3
    steps:
      - name: Dispatch to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ matrix.repo }}/dispatches \
            -f event_type=argo_deploy \
            -F client_payload='${{ toJson(github.event.client_payload) }}'
