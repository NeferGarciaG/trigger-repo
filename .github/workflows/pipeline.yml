name: Pipeline on Argo Deploy

on:
  repository_dispatch:
    types: [argo_deploy]

# ── Configuración por entorno ────────────────────────────────────────────────
#
#   POC (argo-github, paths: svc-a/overlays/stg/...):
#     STATE_REPO:          NeferGarciaG/argo-github
#     OVERLAY_PATH_FILTER: /overlays/stg/
#     SERVICE_SED:         s|/overlays/stg/.*||
#     APP_SUFFIX:          -stg
#
#   Producción (yp-state, paths: overlays/bp-alias-connection/dev/kustomization.yaml):
#     STATE_REPO:          vgitapps/yp-state-ads-us-lower-envs
#     OVERLAY_PATH_FILTER: /overlays/[^/]*/dev/
#     SERVICE_SED:         s|^overlays/||;s|/dev/.*||
#     APP_SUFFIX:          -dev
#     ejemplo: overlays/bp-alias-connection/dev/kustomization.yaml → bp-alias-connection → bp-alias-connection-dev
#
#   Nota multi-cluster: el ApplicationSet genera nombres con sufijo de cluster
#   (bp-alias-connection-dev-north-virginia-cde). El pipeline usa prefix matching:
#   busca statuses cuyo context empiece con "argocd/<SVC>" en lugar de exact match.
# ────────────────────────────────────────────────────────────────────────────
env:
  STATE_REPO: NeferGarciaG/argo-github
  OVERLAY_PATH_FILTER: /overlays/stg/
  SERVICE_SED: 's|/overlays/stg/.*||'
  APP_SUFFIX: -stg

jobs:
  # Job 1: registers the service that just deployed as healthy
  set-status:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.22
    steps:
      - name: Install dependencies
        run: apk add --no-cache bash curl jq github-cli

      - name: Set commit status for this service
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_ARGO_TOKEN }}
          REVISION: ${{ github.event.client_payload.revision }}
          APP: ${{ github.event.client_payload.app }}
        run: |
          echo "📌 Registering $APP as healthy @ $REVISION"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/$STATE_REPO/statuses/$REVISION \
            -f state=success \
            -f context="argocd/$APP" \
            -f description="Deployed healthy by ArgoCD"

  # Job 2: detects which services changed in this commit and validates all are healthy
  detect-and-check:
    needs: set-status
    runs-on: ubuntu-latest
    container:
      image: alpine:3.22
    outputs:
      all_changed_healthy: ${{ steps.check.outputs.all_changed_healthy }}
      changed_services: ${{ steps.check.outputs.changed_services }}
      failed_services: ${{ steps.check.outputs.failed_services }}
    steps:
      - name: Install dependencies
        run: apk add --no-cache bash curl jq github-cli

      - name: Detect changed services and check health
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_ARGO_TOKEN }}
          REVISION: ${{ github.event.client_payload.revision }}
          APP: ${{ github.event.client_payload.app }}
        run: |
          echo "🔍 Detecting services changed in $REVISION (triggered by $APP)"

          # Get modified files in this commit
          CHANGED_FILES=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/$STATE_REPO/commits/$REVISION \
            --jq '.files[].filename')

          echo "Modified files:"
          echo "$CHANGED_FILES"

          # Map overlay paths to Application CR names using configurable sed expression
          # POC:  svc-a/overlays/stg/file  → svc-a  → svc-a-stg
          # Prod: overlays/auth/stg/file   → auth   → auth-stg
          CHANGED_SERVICES=$(echo "$CHANGED_FILES" \
            | grep "$OVERLAY_PATH_FILTER" \
            | sed "$SERVICE_SED" \
            | sort -u \
            | sed "s/$/$APP_SUFFIX/")

          if [ -z "$CHANGED_SERVICES" ]; then
            echo "ℹ️  No service overlays changed in this commit — nothing to validate"
            echo "all_changed_healthy=true" >> $GITHUB_OUTPUT
            echo "changed_services=" >> $GITHUB_OUTPUT
            echo "failed_services=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo ""
          echo "Services with changes in this commit:"
          echo "$CHANGED_SERVICES"

          # Get current commit statuses for this revision
          STATUSES=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/$STATE_REPO/commits/$REVISION/statuses)

          ALL_HEALTHY=true
          FAILED=()
          CHANGED_LIST=()

          while IFS= read -r SVC; do
            [ -z "$SVC" ] && continue
            CHANGED_LIST+=("$SVC")
            # Prefix matching: handles both single-cluster (exact: "argocd/svc-a-stg")
            # and multi-cluster (prefix: "argocd/bp-alias-connection-dev-north-virginia-cde")
            STATUS_COUNT=$(echo "$STATUSES" | jq \
              --arg prefix "argocd/$SVC" \
              '[.[] | select(.context | startswith($prefix)) | select(.state == "success")] | length')

            if [ "$STATUS_COUNT" -gt 0 ]; then
              echo "  ✅ $SVC — healthy"
            else
              echo "  ❌ $SVC — did not report healthy (degraded or still deploying)"
              ALL_HEALTHY=false
              FAILED+=("$SVC")
            fi
          done <<< "$CHANGED_SERVICES"

          # Export results
          CHANGED_STR=$(IFS=','; echo "${CHANGED_LIST[*]}")
          FAILED_STR=$(IFS=','; echo "${FAILED[*]}")

          echo "changed_services=$CHANGED_STR" >> $GITHUB_OUTPUT
          echo "failed_services=$FAILED_STR"   >> $GITHUB_OUTPUT

          if [ "$ALL_HEALTHY" = "true" ]; then
            echo "all_changed_healthy=true" >> $GITHUB_OUTPUT
            echo ""
            echo "✅ All modified services are healthy"
          else
            echo "all_changed_healthy=false" >> $GITHUB_OUTPUT
            echo ""
            echo "❌ Failed services: ${FAILED[*]}"
            echo "⏳ Pipeline on hold — not all changes are healthy"
          fi

  # Job 3: checks if the commit contains [release]
  check-release:
    needs: detect-and-check
    if: needs.detect-and-check.outputs.all_changed_healthy == 'true'
    runs-on: ubuntu-latest
    container:
      image: alpine:3.22
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - name: Install dependencies
        run: apk add --no-cache bash curl jq github-cli

      - name: Check if revision is a release commit
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_ARGO_TOKEN }}
          REVISION: ${{ github.event.client_payload.revision }}
        run: |
          COMMIT_MSG=$(gh api /repos/$STATE_REPO/commits/$REVISION --jq '.commit.message')
          echo "Revision : $REVISION"
          echo "Message  : $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qi "\[release\]"; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "✅ Release commit — pipeline will run"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "⏭️  Not a release commit — skipping"
          fi

  # Job 4: runs the actual pipeline
  run-pipeline:
    needs: [detect-and-check, check-release]
    if: needs.check-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: alpine:3.22
    steps:
      - name: Install dependencies
        run: apk add --no-cache bash

      - name: Run pipeline
        shell: bash
        run: |
          echo "🚀 Running pipeline"
          echo "Changed services        : ${{ needs.detect-and-check.outputs.changed_services }}"
          echo "Triggered by app        : ${{ github.event.client_payload.app }}"
          echo "Env                     : ${{ github.event.client_payload.env }}"
          echo "Revision                : ${{ github.event.client_payload.revision }}"
          echo "Argo link               : ${{ github.event.client_payload.argo_link }}"
